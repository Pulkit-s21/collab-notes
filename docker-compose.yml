services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: collab_notes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env.docker
    ports:
      - "5000:5000"
    depends_on:
      - db

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  postgres_data:
